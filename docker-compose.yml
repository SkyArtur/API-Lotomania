services:
  db:
    image: postgres:17-alpine
    container_name: lot_db
    restart: always
    env_file:
      - ./.env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - lot_data:/var/lib/postgresql/data
    networks:
      - lot_network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: lot_api
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lot_network

volumes:
  lot_data:

networks:
  lot_network:
