server {
    listen 80;

    location /static/ {
        alias /staticfiles/;  # caminho dentro do container nginx
    }

    location / {
        proxy_pass http://api:8080;  # nome do serviço no compose

        proxy_set_header Host $host; # Diz ao Django qual foi o domínio original
        proxy_set_header X-Real-IP $remote_addr; # IP Real, sem ele o django só vê localhost
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # Cadeia de IPs (cliente + proxies)
        proxy_set_header X-Forwarded-Proto $scheme; # sem todas as requisições são http
    }
}